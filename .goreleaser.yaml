# https://goreleaser.com/customization/
version: 2

project_name: auth0-mock

before:
  hooks:
    - go mod tidy
    - go mod download
    # Generates licenses/<dep>/LICENSE per bundled Go module. Required for
    # MIT/Apache/BSD attribution travelling with the binary. Output sits at
    # the repo root (not under dist/) so it's available when goreleaser
    # cleans dist/ between the `before:` hook and `ensuring distribution
    # directory` — otherwise the pipeline fails with "dist is not empty".
    - make licenses

builds:
  - id: auth0-mock
    main: ./cmd/api
    binary: auth0-mock
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sergiught/auth0-mock/internal/version.Version={{ .Version }}
      - -X github.com/sergiught/auth0-mock/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/sergiught/auth0-mock/internal/version.Date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format: tar.gz
    files:
      - LICENSE
      - NOTICE
      - README.md
      - CHANGELOG.md
      - docs/COOKBOOK.md
      - docs/ARCHITECTURE.md
      - src: licenses
        dst: licenses
        strip_parent: false

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Software Bill of Materials per archive. syft must be on PATH (the release
# workflow installs it via anchore/sbom-action). Output is SPDX-JSON so it
# plays nicely with FOSSA / Snyk / Black Duck without a conversion step.
sboms:
  - id: archives
    artifacts: archive
    documents:
      - '${artifact}.spdx.json'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

# release-please owns the CHANGELOG and writes the GitHub release body when it
# creates the tag (see .github/workflows/release.yml). Goreleaser only appends
# build artifacts to the existing release; it should not generate its own
# changelog or replace the body.
changelog:
  disable: true

# ── Docker (multi-arch via per-platform images + manifests) ─────────────────
#
# Split into per-registry entries so each can be skip_push'd independently.
# Docker Hub pushes are gated on DOCKERHUB_USERNAME (passed through from
# release.yml's env) so first-release / fork runs without Docker Hub creds
# publish to GHCR alone instead of failing the whole pipeline on a 10×
# retry against an unauthenticated docker.io. GHCR uses GITHUB_TOKEN and
# is always authenticated.

dockers:
  # ── GHCR — always pushed ─────────────────────────────────────────────────
  - id: ghcr-linux-amd64
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.release
    image_templates:
      - 'ghcr.io/sergiught/auth0-mock:{{ .Version }}-amd64'
    build_flag_templates:
      - '--platform=linux/amd64'
      - '--label=org.opencontainers.image.title={{ .ProjectName }}'
      - '--label=org.opencontainers.image.description=Drop-in mock of Auth0''s Authentication and Management APIs.'
      - '--label=org.opencontainers.image.url=https://github.com/sergiught/auth0-mock'
      - '--label=org.opencontainers.image.source=https://github.com/sergiught/auth0-mock'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.revision={{ .FullCommit }}'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.licenses=MIT'
    extra_files:
      - LICENSE
      - NOTICE
      - licenses

  - id: ghcr-linux-arm64
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.release
    image_templates:
      - 'ghcr.io/sergiught/auth0-mock:{{ .Version }}-arm64'
    build_flag_templates:
      - '--platform=linux/arm64'
      - '--label=org.opencontainers.image.title={{ .ProjectName }}'
      - '--label=org.opencontainers.image.description=Drop-in mock of Auth0''s Authentication and Management APIs.'
      - '--label=org.opencontainers.image.url=https://github.com/sergiught/auth0-mock'
      - '--label=org.opencontainers.image.source=https://github.com/sergiught/auth0-mock'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.revision={{ .FullCommit }}'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.licenses=MIT'
    extra_files:
      - LICENSE
      - NOTICE
      - licenses

  # ── Docker Hub — skip_push templated on DOCKERHUB_USERNAME presence ──────
  - id: dockerhub-linux-amd64
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.release
    skip_push: '{{ if eq (envOrDefault "DOCKERHUB_USERNAME" "") "" }}true{{ else }}false{{ end }}'
    image_templates:
      - 'docker.io/sergiught/auth0-mock:{{ .Version }}-amd64'
    build_flag_templates:
      - '--platform=linux/amd64'
      - '--label=org.opencontainers.image.title={{ .ProjectName }}'
      - '--label=org.opencontainers.image.description=Drop-in mock of Auth0''s Authentication and Management APIs.'
      - '--label=org.opencontainers.image.url=https://github.com/sergiught/auth0-mock'
      - '--label=org.opencontainers.image.source=https://github.com/sergiught/auth0-mock'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.revision={{ .FullCommit }}'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.licenses=MIT'
    extra_files:
      - LICENSE
      - NOTICE
      - licenses

  - id: dockerhub-linux-arm64
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.release
    skip_push: '{{ if eq (envOrDefault "DOCKERHUB_USERNAME" "") "" }}true{{ else }}false{{ end }}'
    image_templates:
      - 'docker.io/sergiught/auth0-mock:{{ .Version }}-arm64'
    build_flag_templates:
      - '--platform=linux/arm64'
      - '--label=org.opencontainers.image.title={{ .ProjectName }}'
      - '--label=org.opencontainers.image.description=Drop-in mock of Auth0''s Authentication and Management APIs.'
      - '--label=org.opencontainers.image.url=https://github.com/sergiught/auth0-mock'
      - '--label=org.opencontainers.image.source=https://github.com/sergiught/auth0-mock'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.revision={{ .FullCommit }}'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.licenses=MIT'
    extra_files:
      - LICENSE
      - NOTICE
      - licenses

docker_manifests:
  # GHCR — always pushed; cosign-signed via the docker_signs block below.
  - id: ghcr-version
    name_template: 'ghcr.io/sergiught/auth0-mock:{{ .Version }}'
    image_templates:
      - 'ghcr.io/sergiught/auth0-mock:{{ .Version }}-amd64'
      - 'ghcr.io/sergiught/auth0-mock:{{ .Version }}-arm64'
  - id: ghcr-latest
    name_template: 'ghcr.io/sergiught/auth0-mock:latest'
    image_templates:
      - 'ghcr.io/sergiught/auth0-mock:{{ .Version }}-amd64'
      - 'ghcr.io/sergiught/auth0-mock:{{ .Version }}-arm64'
  # Docker Hub — skip_push templated on DOCKERHUB_USERNAME presence.
  # Not currently cosign-signed (the canonical signed surface is GHCR);
  # adopters who need attestation can pull the digest-equivalent image
  # from ghcr.io and verify there.
  - id: dockerhub-version
    name_template: 'docker.io/sergiught/auth0-mock:{{ .Version }}'
    skip_push: '{{ if eq (envOrDefault "DOCKERHUB_USERNAME" "") "" }}true{{ else }}false{{ end }}'
    image_templates:
      - 'docker.io/sergiught/auth0-mock:{{ .Version }}-amd64'
      - 'docker.io/sergiught/auth0-mock:{{ .Version }}-arm64'
  - id: dockerhub-latest
    name_template: 'docker.io/sergiught/auth0-mock:latest'
    skip_push: '{{ if eq (envOrDefault "DOCKERHUB_USERNAME" "") "" }}true{{ else }}false{{ end }}'
    image_templates:
      - 'docker.io/sergiught/auth0-mock:{{ .Version }}-amd64'
      - 'docker.io/sergiught/auth0-mock:{{ .Version }}-arm64'

# Cosign keyless signing for the GHCR manifests only. Uses the workflow's
# OIDC token (id-token: write) — no long-lived key to manage. Docker Hub
# manifests aren't signed by this workflow because they're skip_push'd
# when DOCKERHUB_USERNAME isn't set, which would break cosign sign on
# the non-pushed digest. GHCR is the canonical signed surface; adopters
# pulling the docker.io mirror can verify the equivalent GHCR digest.
#
# Verify with (matches the regex shipped in README.md + docs/DOCKERHUB.md):
#   cosign verify \
#     --certificate-identity-regexp 'https://github.com/sergiught/auth0-mock/\.github/workflows/release\.yml@.+' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     ghcr.io/sergiught/auth0-mock:vX.Y.Z
docker_signs:
  - cmd: cosign
    artifacts: manifests
    ids: [ghcr-version, ghcr-latest]
    args:
      - 'sign'
      - '--yes'
      - '${artifact}@${digest}'
    output: true

release:
  github:
    owner: sergiught
    name: auth0-mock
  # Append-only: release-please has already created the release with a body
  # generated from the conventional-commit CHANGELOG. We just attach binaries
  # and checksums here without touching the title or body.
  mode: append
  draft: false
  prerelease: auto

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: '1.26'
  GOLANGCI_LINT_VERSION: 'v2.5.0'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: lint (gofmt + go vet + golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      # golangci/golangci-lint-action v9.2.0
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: -c .golangci.yaml ./...

  test:
    name: test (-race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: make test
        run: make test

  test-features:
    name: godog acceptance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: make test-features
        run: make test-features

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: make vuln
        run: make vuln

  commitlint:
    name: commitlint (PR commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: lint PR commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eo pipefail
          fail=0
          for sha in $(git log --format=%H "$BASE_SHA..$HEAD_SHA"); do
            subject=$(git log -1 --format=%s "$sha")
            echo "::group::Commit $sha — $subject"
            git log -1 --format=%B "$sha" > .git/COMMIT_EDITMSG
            if ! make lint-commits; then
              echo "::error::commit $sha violates commitlint.yaml"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

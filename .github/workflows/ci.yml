name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: '1.26'
  GOLANGCI_LINT_VERSION: 'v2.12.2'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: lint (golangci-lint + openapi drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # golangci/golangci-lint-action v9.2.0
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: -c .golangci.yaml ./...
      - name: go mod verify
        run: go mod verify
      - name: check go.mod / go.sum drift
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: regenerate openapi spec
        run: make openapi
      - name: check openapi spec is up to date
        run: git diff --exit-code api/auth0-mock.openapi.json

  test:
    name: test (-race, coverage)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matrix catches toolchain drift between the pinned-current and
        # stable channels — cheap insurance for a library/server. The first
        # entry (env.GO_VERSION) is what the Makefile / Dockerfile pin to;
        # the second tracks whatever Go upstream calls "stable" today.
        go-version: ['1.26', 'stable']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: make test-cover
        run: make test-cover
      - name: upload coverage to Codecov (unit)
        # Only the pinned-Go run uploads; otherwise the matrix double-counts.
        if: matrix.go-version == '1.26'
        # codecov/codecov-action v5.1.2
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/unit.out
          flags: unit
          fail_ci_if_error: false

  test-features:
    name: godog acceptance suite (coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: make test-features-cover
        # GODOG_FORMAT lets the suite emit pretty (for log readability)
        # + junit (for the failures-as-annotations artifact below)
        # without changing default local behaviour.
        env:
          GODOG_FORMAT: 'pretty,junit:godog-report.xml'
        run: make test-features-cover
      - name: upload godog junit report
        if: always()
        # actions/upload-artifact v4.4.3
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: godog-junit-report
          path: ./cmd/api/godog-report.xml
          if-no-files-found: warn
          retention-days: 14
      - name: upload coverage to Codecov (features)
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/features.out
          flags: features
          fail_ci_if_error: false

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: make vuln
        run: make vuln

  commitlint:
    name: commitlint (PR title)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: lint PR title
        # Squash-merge uses the PR title as the commit subject, which
        # release-please parses for the changelog — so the title is what
        # needs to follow Conventional Commits, not the individual commits.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -eo pipefail
          printf '%s\n' "$PR_TITLE" > .git/COMMIT_EDITMSG
          if ! make lint-commits; then
            echo "::error::PR title \"$PR_TITLE\" violates commitlint.yaml"
            exit 1
          fi

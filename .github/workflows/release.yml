name: release

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.26'
  GORELEASER_VERSION: 'v2.4.5'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. release-please ───────────────────────────────────────────────────
  #
  # On every push to main, release-please either opens/updates a "Release PR"
  # (collecting all conventional commits since the last tag) or — if the
  # current push IS the merged Release PR — cuts the tag and creates the
  # GitHub release with the generated CHANGELOG as the body.
  #
  # release_created=true only on the second case; that's what gates goreleaser.
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create tags/releases
      pull-requests: write   # open/update the Release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      # googleapis/release-please-action v4.1.3
      #
      # Uses RELEASE_PLEASE_TOKEN (a fine-grained PAT with Contents +
      # Pull-requests write) rather than the default GITHUB_TOKEN. GitHub
      # silently skips `push` / `pull_request` workflows for events
      # triggered by GITHUB_TOKEN (recursion guard), which means the Release
      # PR opened with the default token gets no CI checks. Using a PAT
      # makes the PR look like it came from a real user, so ci.yml fires
      # normally.
      - uses: googleapis/release-please-action@cc61a07e2da466bebbc19b3a7dd01d6aecb20d1e
        id: release
        with:
          token:         ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── 2. goreleaser ───────────────────────────────────────────────────────
  #
  # Runs only when release-please cut a real release. Checks out the freshly
  # created tag, builds linux/darwin × amd64/arm64 archives, pushes multi-arch
  # Docker manifests to Docker Hub and ghcr.io, and uploads binaries +
  # checksums to the existing GitHub release (append mode — does not touch
  # the release body that release-please wrote).
  goreleaser:
    name: goreleaser
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # upload release artifacts to the GitHub release
      packages: write   # push images to ghcr.io
      id-token: write   # cosign keyless signing via OIDC
    # Hoist DOCKERHUB_USERNAME to job-level env so step `if:` checks can read
    # it as `env.DOCKERHUB_USERNAME`. The `secrets` context isn't allowed in
    # step-level `if:` expressions — using it makes the whole workflow fail
    # to register (silently, runs end at 0s).
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0   # full history so goreleaser can compute ldflag values
          # Standard supply-chain hardening: don't leave the workflow token
          # in .git/config where any subsequent action step (goreleaser,
          # cosign, syft, …) could read it. Each step passes its required
          # token explicitly via env.
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # docker/setup-qemu-action v3.2.0 — enables arm64 build on amd64 runner
      - uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf
        with:
          platforms: linux/amd64,linux/arm64

      # docker/setup-buildx-action v3.7.1
      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349

      # sigstore/cosign-installer v3.7.0 — keyless Docker image signing via the
      # workflow's OIDC token. Goreleaser invokes `cosign sign` per the
      # docker_signs block in .goreleaser.yaml.
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da
        with:
          cosign-release: 'v2.4.1'

      # anchore/sbom-action/download-syft v0.17.7 — syft is required on PATH so
      # the sboms block in .goreleaser.yaml can generate SPDX-JSON SBOMs for
      # each release archive.
      - uses: anchore/sbom-action/download-syft@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0
        with:
          syft-version: 'v1.18.1'

      # docker/login-action v3.3.0
      # Gated on DOCKERHUB_USERNAME so first-release / fork runs without
      # Docker Hub creds publish to GHCR only instead of aborting the
      # whole workflow when docker-login fails fast on empty creds.
      # Goreleaser's docker.io image_templates simply fail to push if
      # the login was skipped — acceptable for a GHCR-only release.
      - name: log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # goreleaser/goreleaser-action v6.1.0
      - name: run goreleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Passed through so .goreleaser.yaml's dockers[].skip_push template
          # can detect whether Docker Hub creds are available and skip the
          # docker.io push when they aren't (envOrDefault check). GHCR push
          # is unaffected and always proceeds.
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

openapi: 3.1.0
info:
  title: auth0-mock admin0 control plane
  version: 1.0.0
tags:
  - name: Claims
    description: |
      Global custom-claim overlay. Claims set here are merged into every token
      the mock mints, so tests can assert on claims without a real rule/action.
  - name: Permissions
    description: |
      Per-audience RBAC permission overlays. Lets tests pre-seed the
      permissions a token carries for a given API identifier.
  - name: MFA
    description: |
      The mock-wide MFA-required flag. When set, password-style grants return
      an `mfa_required` error so step-up flows can be exercised.
  - name: Expectations
    description: |
      Registered canned responses ("expectations") for Management API
      operations, plus the global state reset. None of these require
      authentication.
  - name: Clock
    description: |
      Runtime clock control. Lets tests freeze the mock's perception of
      time, set an offset against wall-clock, or advance step-by-step
      through time — so token expiry, code TTLs, and refresh windows can
      be exercised deterministically without sleeps. The same clock
      drives JWT iat/exp on mint and the bearer middleware's expiry
      check on validate.
  - name: Event Producer
    description: |
      Producer side of the SSE hub feeding `GET /api/v2/events`. Tests
      POST Auth0 event-stream envelopes here and every connected
      subscriber sees them in real time. The mock keeps a bounded
      replay ring buffer (default 100 events; `EVENTS_REPLAY_BUFFER`)
      so reconnecting subscribers can resume via `Last-Event-ID`,
      `?from=<id>`, or `?from_timestamp=<rfc3339>`.

      The matching consumer-side endpoint `GET /api/v2/events` lives
      under the Management API's `Events` tag.
paths:
  /admin0/reset:
    post:
      tags: [Expectations]
      summary: Wipe every store admin0 governs (expectations, claims, permissions, mfa-required).
      responses:
        "204": { description: Reset complete. }
  /admin0/expectations:
    post:
      tags: [Expectations]
      summary: Register (or replace) a canned response for a Management API operation.
      description: |
        The target operation is identified by `method` + `path`. `path` may be
        concrete (`/api/v2/users/auth0|1`) or an OpenAPI template
        (`/api/v2/users/{id}`); concrete registrations win over template ones
        at request time. The optional `request` matcher conditions the
        expectation on the incoming query + body — multiple expectations may be
        registered per operation, the most specific match wins, ties broken by
        newest. `response.body` is validated against the operation's response
        schema for `response.status`, and the `request` matcher against the
        operation's request schema, before anything is stored.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Expectation" }
      responses:
        "204": { description: Expectation stored. }
        "400":
          description: Body could not be parsed, names an unknown operation, or violates the response schema.
    get:
      tags: [Expectations]
      summary: List every registered expectation.
      responses:
        "200":
          description: Registered expectations.
          content:
            application/json:
              schema:
                type: object
                required: [expectations]
                properties:
                  expectations:
                    type: array
                    items: { $ref: "#/components/schemas/Expectation" }
    delete:
      tags: [Expectations]
      summary: Clear expectations — one (with a body) or all (with no body).
      description: |
        With an empty body, clears every registered expectation. With a
        `{ "method": ..., "path": ... }` body, clears every expectation
        registered for that operation (the catch-all and every
        request-matched one).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required: [method, path]
              properties:
                method: { type: string }
                path:   { type: string }
      responses:
        "204": { description: Expectation(s) cleared. }
        "400": { description: Body was present but could not be parsed or was missing method/path. }
  /admin0/claims:
    get:
      tags: [Claims]
      summary: Read the global custom claim overlay applied to minted tokens.
      responses:
        "200":
          description: Current claims map.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      tags: [Claims]
      summary: Replace the global custom claim overlay.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "204": { description: Claims updated. }
    delete:
      tags: [Claims]
      summary: Clear the global custom claim overlay.
      responses:
        "204": { description: Claims cleared. }
  /admin0/permissions:
    get:
      tags: [Permissions]
      summary: List every audience that has a permissions overlay configured.
      responses:
        "200":
          description: Map of audience to permission list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items: { type: string }
    delete:
      tags: [Permissions]
      summary: Clear every per-audience permissions overlay.
      responses:
        "204": { description: All overlays cleared. }
  /admin0/permissions/{audience}:
    parameters:
      - name: audience
        in: path
        required: true
        description: |
          API identifier — may include `/` characters. Chi mounts the
          underlying handler with a `*` wildcard so the slashes round-trip; the
          OpenAPI path uses the canonical `{audience}` form for tools that
          can't represent wildcard paths.
        schema: { type: string }
    get:
      tags: [Permissions]
      summary: Read the permissions overlay for one audience.
      responses:
        "200":
          description: Permission list.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
    put:
      tags: [Permissions]
      summary: Replace the permissions overlay for one audience.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { type: string }
      responses:
        "204": { description: Overlay updated. }
    delete:
      tags: [Permissions]
      summary: Clear the permissions overlay for one audience.
      responses:
        "204": { description: Overlay cleared. }
  /admin0/mfa-required:
    get:
      tags: [MFA]
      summary: Read the current MFA-required flag.
      responses:
        "200":
          description: Current flag.
          content:
            application/json:
              schema:
                type: object
                required: [required]
                properties:
                  required: { type: boolean }
    put:
      tags: [MFA]
      summary: Set the MFA-required flag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [required]
              properties:
                required: { type: boolean }
      responses:
        "204": { description: Flag updated. }
  /admin0/clock:
    get:
      tags: [Clock]
      summary: Report the current clock mode and resolved Now.
      responses:
        "200":
          description: Current clock state.
          content:
            application/json:
              schema:
                type: object
                required: [mode, now]
                properties:
                  mode:
                    type: string
                    enum: [real, frozen, offset]
                  now:
                    type: string
                    format: date-time
                    description: |
                      RFC 3339 UTC representation of the current effective
                      time according to the mock.
                  offset:
                    type: string
                    description: |
                      Configured skew in Go duration form (e.g. "25h0m0s").
                      Present only when `mode` is `offset`.
    put:
      tags: [Clock]
      summary: Freeze the clock at an instant or switch to offset mode.
      description: |
        Body must contain exactly one of `now` (RFC 3339 instant — switches
        to frozen mode) or `offset` (Go duration string — switches to offset
        mode). Sending both, neither, or unparseable values returns 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                now:
                  type: string
                  format: date-time
                  description: RFC 3339 instant. Freezes Now() here.
                offset:
                  type: string
                  description: |
                    Go duration string (e.g. "25h"). Negative durations
                    are accepted, but use the explicit hours form like
                    "-168h" — Go's parser doesn't support unit "d".
      responses:
        "204": { description: Clock updated. }
        "400":
          description: |
            Body could not be parsed, set both/neither of `now`/`offset`,
            contained an unknown field (e.g. `noow` instead of `now` →
            `errorCode: "invalid_clock_field"`), or contained an
            invalid value.
    delete:
      tags: [Clock]
      summary: Restore the clock to real mode.
      responses:
        "204": { description: Clock restored to real. }
  /admin0/clock/advance:
    post:
      tags: [Clock]
      summary: Mutate the held value by a delta.
      description: |
        Adds `by` to the held clock value. In frozen mode the pinned
        instant moves by `by`; in offset mode the configured offset
        grows by `by`. In real mode returns 400 invalid_clock_state.
        Negative durations are allowed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [by]
              properties:
                by:
                  type: string
                  description: Go duration (e.g. "25h", "-30m").
      responses:
        "204": { description: Clock advanced. }
        "400":
          description: |
            Body could not be parsed, contained an unknown field
            (`errorCode: "invalid_clock_field"`), contained an invalid
            duration, or attempted to advance the clock in real mode.
  /admin0/events:
    post:
      tags: ["Event Producer"]
      summary: Push an Auth0 event-stream envelope onto GET /api/v2/events.
      description: |
        Fan-out producer for the SSE hub. The mock validates the body
        against the Auth0 Management API's `text/event-stream` response
        schema (`EventStreamSubscribeEventsResponseContent`) before
        broadcasting; misshapen payloads are rejected with `400
        invalid_event` and a one-line `"/json/pointer": reason` per
        failed field.

        Subscribers connected to `GET /api/v2/events` receive the event
        in real time. The buffer (default 100 events, configurable via
        `EVENTS_REPLAY_BUFFER`) lets reconnecting subscribers replay
        missed events via `Last-Event-ID`, `?from=<id>`, or
        `?from_timestamp=<rfc3339>`. Aged-out resume → `410
        event_aged_out`.
      requestBody:
        required: true
        description: |
          Auth0 event-stream envelope: `{type, offset, event: { ... CloudEvent ... }}`.
          The server validates the body against the Mgmt API's
          `EventStreamSubscribeEventsResponseContent` schema before
          fan-out. See that schema for the full shape — it is one of
          the 23 CloudEvent variants gated by the outer `type`
          discriminator.
        content:
          application/json:
            schema:
              type: object
              required: [type, offset, event]
              properties:
                type:
                  type: string
                  description: |
                    CloudEvent discriminator, e.g. `user.created`.
                    Drives `?event_type` filtering on the subscriber
                    side and the SSE `event:` field on the wire.
                offset:
                  type: string
                  description: |
                    Producer-defined offset string echoed back to
                    subscribers. Auth0's docs use this for resume
                    bookkeeping; the mock accepts any string.
                event:
                  type: object
                  description: |
                    The full CloudEvent. Required fields per the
                    Auth0 schema include `id`, `specversion`, `type`,
                    `source`, `time`, `a0tenant`, `a0stream`, `data`.
                    `id` must match `evt_[a-zA-Z0-9]{16}`; use
                    `auth0mock.NewEventID()` in Go tests.
      responses:
        "202":
          description: Event accepted and broadcast.
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string
                    description: |
                      The event's inner `event.id`, echoed for client
                      correlation.
        "400":
          description: |
            Body is not JSON (`errorCode: "invalid_body"`) or fails
            schema validation (`errorCode: "invalid_event"`). The
            response `message` lists every failing field as
            `"/json/pointer": reason; ...`.
  /admin0/events/subscribers:
    get:
      tags: ["Event Producer"]
      summary: Report active and lifetime subscriber counts for the SSE hub.
      description: |
        Observability for `GET /api/v2/events`, for tests that set
        expectations on or verify the SSE connection lifecycle — e.g.
        asserting a consumer's stream closed cleanly, or that a client
        reconnected the expected number of times.

        `active` is eventually-consistent: a subscriber leaves the
        count only when the mock observes its connection close, which
        can lag the client's disconnect by a few milliseconds. Poll
        until `active` settles rather than reading it immediately after
        closing a stream. `total` counts every connection since the
        last `/admin0/reset`, which zeroes it.
      responses:
        "200":
          description: Current subscriber counts.
          content:
            application/json:
              schema:
                type: object
                required: [active, total]
                properties:
                  active:
                    type: integer
                    description: Subscribers connected right now.
                  total:
                    type: integer
                    description: |
                      Subscriptions opened since the last
                      `/admin0/reset`. Monotonic within that window.
components:
  schemas:
    Expectation:
      type: object
      description: |
        A canned response registered for one Management API operation,
        optionally conditioned on the incoming request.
      required: [method, path, response]
      properties:
        method:
          type: string
          description: HTTP verb of the target operation.
          example: POST
        path:
          type: string
          description: |
            Target operation path — concrete (`/api/v2/users/auth0|1`) or an
            OpenAPI template (`/api/v2/users/{id}`).
          example: /api/v2/users
        request:
          $ref: "#/components/schemas/RequestMatcher"
        response:
          $ref: "#/components/schemas/ResponseDef"
    RequestMatcher:
      type: object
      description: |
        Optional conditions the incoming request must satisfy for the
        expectation to apply. Omit it (or send `{}`) for a catch-all. `query`
        and `body` are subset-matched: every key you specify must be present
        and equal in the real request; extra keys are allowed. Arrays and
        scalars must match exactly. The matcher is validated against the
        operation's request schema (with `required` relaxed) at registration.
      properties:
        query:
          type: object
          additionalProperties: { type: string }
          description: Query parameters the request must carry.
        body:
          description: JSON the request body must contain (subset match).
    ResponseDef:
      type: object
      description: The canned response the mock returns when the expectation applies.
      required: [status]
      properties:
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: HTTP status code the mock should return.
          example: 201
        headers:
          type: object
          additionalProperties: { type: string }
          description: Optional headers to attach to the response.
        body:
          description: |
            Response body the mock should return. Validated against the target
            operation's response schema for `status` before it is stored.

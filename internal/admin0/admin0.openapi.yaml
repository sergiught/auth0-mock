openapi: 3.1.0
info:
  title: auth0-mock admin0 control plane
  version: 1.0.0
tags:
  - name: Claims
    description: |
      Global custom-claim overlay. Claims set here are merged into every token
      the mock mints, so tests can assert on claims without a real rule/action.
  - name: Permissions
    description: |
      Per-audience RBAC permission overlays. Lets tests pre-seed the
      permissions a token carries for a given API identifier.
  - name: MFA
    description: |
      The mock-wide MFA-required flag. When set, password-style grants return
      an `mfa_required` error so step-up flows can be exercised.
  - name: Matches
    description: |
      Registered `/match` entries across the Mgmt API surface, plus the global
      state reset. None of these require authentication.
paths:
  /admin0/reset:
    post:
      tags: [Matches]
      summary: Wipe every store admin0 governs (matches, claims, permissions, mfa-required).
      responses:
        "204": { description: Reset complete. }
  /admin0/matches:
    get:
      tags: [Matches]
      summary: List every registered `/match` entry across the Mgmt API surface.
      responses:
        "200":
          description: Match entries.
          content:
            application/json:
              schema:
                type: object
                required: [matches]
                properties:
                  matches:
                    type: array
                    items:
                      type: object
                      required: [method, path, status]
                      properties:
                        method:  { type: string, description: "HTTP verb of the matched operation." }
                        path:    { type: string, description: "Path the match was registered against." }
                        status:  { type: integer, description: "HTTP status the mock will return." }
                        headers:
                          type: object
                          additionalProperties: { type: string }
                        body:
                          description: Programmed response body (any JSON-serialisable value).
  /admin0/claims:
    get:
      tags: [Claims]
      summary: Read the global custom claim overlay applied to minted tokens.
      responses:
        "200":
          description: Current claims map.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      tags: [Claims]
      summary: Replace the global custom claim overlay.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "204": { description: Claims updated. }
    delete:
      tags: [Claims]
      summary: Clear the global custom claim overlay.
      responses:
        "204": { description: Claims cleared. }
  /admin0/permissions:
    get:
      tags: [Permissions]
      summary: List every audience that has a permissions overlay configured.
      responses:
        "200":
          description: Map of audience to permission list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items: { type: string }
    delete:
      tags: [Permissions]
      summary: Clear every per-audience permissions overlay.
      responses:
        "204": { description: All overlays cleared. }
  /admin0/permissions/{audience}:
    parameters:
      - name: audience
        in: path
        required: true
        description: |
          API identifier — may include `/` characters. Chi mounts the
          underlying handler with a `*` wildcard so the slashes round-trip; the
          OpenAPI path uses the canonical `{audience}` form for tools that
          can't represent wildcard paths.
        schema: { type: string }
    get:
      tags: [Permissions]
      summary: Read the permissions overlay for one audience.
      responses:
        "200":
          description: Permission list.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
    put:
      tags: [Permissions]
      summary: Replace the permissions overlay for one audience.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { type: string }
      responses:
        "204": { description: Overlay updated. }
    delete:
      tags: [Permissions]
      summary: Clear the permissions overlay for one audience.
      responses:
        "204": { description: Overlay cleared. }
  /admin0/mfa-required:
    get:
      tags: [MFA]
      summary: Read the current MFA-required flag.
      responses:
        "200":
          description: Current flag.
          content:
            application/json:
              schema:
                type: object
                required: [required]
                properties:
                  required: { type: boolean }
    put:
      tags: [MFA]
      summary: Set the MFA-required flag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [required]
              properties:
                required: { type: boolean }
      responses:
        "204": { description: Flag updated. }

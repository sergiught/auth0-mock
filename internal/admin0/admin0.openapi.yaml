openapi: 3.1.0
info:
  title: auth0-mock admin0 control plane
  version: 1.0.0
tags:
  - name: Claims
    description: |
      Global custom-claim overlay. Claims set here are merged into every token
      the mock mints, so tests can assert on claims without a real rule/action.
  - name: Permissions
    description: |
      Per-audience RBAC permission overlays. Lets tests pre-seed the
      permissions a token carries for a given API identifier.
  - name: MFA
    description: |
      The mock-wide MFA-required flag. When set, password-style grants return
      an `mfa_required` error so step-up flows can be exercised.
  - name: Expectations
    description: |
      Registered canned responses ("expectations") for Management API
      operations, plus the global state reset. None of these require
      authentication.
paths:
  /admin0/reset:
    post:
      tags: [Expectations]
      summary: Wipe every store admin0 governs (matches, claims, permissions, mfa-required).
      responses:
        "204": { description: Reset complete. }
  /admin0/expectations:
    post:
      tags: [Expectations]
      summary: Register (upsert) a canned response for a Management API operation.
      description: |
        The target operation is identified by `method` + `path` in the body.
        `path` may be concrete (`/api/v2/users/auth0|1`) or an OpenAPI template
        (`/api/v2/users/{id}`); concrete registrations win over template ones at
        request time. The `body` is validated against the operation's response
        schema for the given `status` before it is stored.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Expectation" }
      responses:
        "204": { description: Expectation stored. }
        "400":
          description: Body could not be parsed, names an unknown operation, or violates the response schema.
    get:
      tags: [Expectations]
      summary: List every registered expectation.
      responses:
        "200":
          description: Registered expectations.
          content:
            application/json:
              schema:
                type: object
                required: [expectations]
                properties:
                  expectations:
                    type: array
                    items: { $ref: "#/components/schemas/Expectation" }
    delete:
      tags: [Expectations]
      summary: Clear expectations — one (with a body) or all (with no body).
      description: |
        With an empty body, clears every registered expectation. With a
        `{ "method": ..., "path": ... }` body, clears only that one.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required: [method, path]
              properties:
                method: { type: string }
                path:   { type: string }
      responses:
        "204": { description: Expectation(s) cleared. }
        "400": { description: Body was present but could not be parsed or was missing method/path. }
  /admin0/claims:
    get:
      tags: [Claims]
      summary: Read the global custom claim overlay applied to minted tokens.
      responses:
        "200":
          description: Current claims map.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      tags: [Claims]
      summary: Replace the global custom claim overlay.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "204": { description: Claims updated. }
    delete:
      tags: [Claims]
      summary: Clear the global custom claim overlay.
      responses:
        "204": { description: Claims cleared. }
  /admin0/permissions:
    get:
      tags: [Permissions]
      summary: List every audience that has a permissions overlay configured.
      responses:
        "200":
          description: Map of audience to permission list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items: { type: string }
    delete:
      tags: [Permissions]
      summary: Clear every per-audience permissions overlay.
      responses:
        "204": { description: All overlays cleared. }
  /admin0/permissions/{audience}:
    parameters:
      - name: audience
        in: path
        required: true
        description: |
          API identifier — may include `/` characters. Chi mounts the
          underlying handler with a `*` wildcard so the slashes round-trip; the
          OpenAPI path uses the canonical `{audience}` form for tools that
          can't represent wildcard paths.
        schema: { type: string }
    get:
      tags: [Permissions]
      summary: Read the permissions overlay for one audience.
      responses:
        "200":
          description: Permission list.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
    put:
      tags: [Permissions]
      summary: Replace the permissions overlay for one audience.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { type: string }
      responses:
        "204": { description: Overlay updated. }
    delete:
      tags: [Permissions]
      summary: Clear the permissions overlay for one audience.
      responses:
        "204": { description: Overlay cleared. }
  /admin0/mfa-required:
    get:
      tags: [MFA]
      summary: Read the current MFA-required flag.
      responses:
        "200":
          description: Current flag.
          content:
            application/json:
              schema:
                type: object
                required: [required]
                properties:
                  required: { type: boolean }
    put:
      tags: [MFA]
      summary: Set the MFA-required flag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [required]
              properties:
                required: { type: boolean }
      responses:
        "204": { description: Flag updated. }
components:
  schemas:
    Expectation:
      type: object
      description: A canned response registered for one Management API operation.
      required: [method, path, status]
      properties:
        method:
          type: string
          description: HTTP verb of the target operation.
          example: GET
        path:
          type: string
          description: |
            Target operation path — concrete (`/api/v2/users/auth0|1`) or an
            OpenAPI template (`/api/v2/users/{id}`).
          example: /api/v2/users/auth0|123
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: HTTP status code the mock should return.
          example: 200
        headers:
          type: object
          additionalProperties: { type: string }
          description: Optional headers to attach to the response.
        body:
          description: |
            Response body the mock should return. Validated against the target
            operation's response schema for `status` before it is stored.

<!doctype html>
<html lang="en">
  <head>
    <title>auth0-mock API reference</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/docs/docs.css" />
    <!--
      The Scalar bundle below is pinned to an exact version and guarded with a
      Subresource Integrity hash — this page mints a real (if short-lived)
      bearer token, so unpinned third-party JS is not something we want to run.
      To bump Scalar: change the version, then recompute the hash with
        curl -sL <url> | openssl dgst -sha384 -binary | openssl base64 -A
    -->
  </head>
  <body>
    <script>
      // Set the theme class on <body> before first paint so there's no flash.
      // Scalar also drives the dark-mode/light-mode class on <body>, so that
      // element is the single source of truth the whole page themes off of.
      (function () {
        var t;
        try { t = localStorage.getItem('auth0-mock-docs-theme'); } catch (e) { /* blocked */ }
        if (t !== 'dark' && t !== 'light') {
          t = (window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.body.classList.add(t + '-mode');
      })();
    </script>
    <header class="docs-header">
      <div class="docs-header__brand">
        <span class="docs-header__wordmark">auth0-mock</span>
        <span class="docs-header__badge">MOCK</span>
      </div>
      <div class="docs-header__actions">
        <a class="docs-header__link" href="https://github.com/sergiught/auth0-mock"
           target="_blank" rel="noopener noreferrer">GitHub</a>
        <button id="theme-toggle" type="button" class="docs-header__toggle"
                aria-label="Switch theme">
          <span class="docs-header__toggle-icon" aria-hidden="true"></span>
        </button>
      </div>
    </header>
    <div id="app"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.55.3/dist/browser/standalone.min.js"
      integrity="sha384-u/Zg79PtgsQJqvDyaod9gOK+Vd81OvakzjgLu6I6m35qTFuFb+MqepR1ErooTvp1"
      crossorigin="anonymous"></script>
    <script>
      (async () => {
        const THEME_KEY = 'auth0-mock-docs-theme';

        function readTheme() {
          try {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved === 'dark' || saved === 'light') return saved;
          } catch (e) { /* localStorage blocked (private mode) */ }
          const prefersDark = !!(window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
          return prefersDark ? 'dark' : 'light';
        }

        function saveTheme(theme) {
          try { localStorage.setItem(THEME_KEY, theme); } catch (e) { /* ignore */ }
        }

        function applyThemeClass(theme) {
          const dark = theme === 'dark';
          // Scalar reads dark-mode/light-mode off <body> and themes its own
          // content from it; our header CSS inherits the same tokens from
          // <body>. Toggling <body> re-themes the whole page in one move.
          document.body.classList.toggle('dark-mode', dark);
          document.body.classList.toggle('light-mode', !dark);
        }

        const theme = readTheme();
        applyThemeClass(theme);

        let token = '';
        try {
          const resp = await fetch('/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'grant_type=client_credentials&client_id=docs&client_secret=docs',
          });
          if (resp.ok) {
            const data = await resp.json();
            token = data.access_token || '';
          }
        } catch (e) {
          console.warn('docs: token preload failed', e);
        }

        if (typeof Scalar === 'undefined') {
          document.getElementById('app').innerHTML =
            '<p class="docs-fallback">' +
            'The API reference UI failed to load (the Scalar bundle could not be fetched). ' +
            'The raw OpenAPI document is still available at ' +
            '<a href="/openapi.json">/openapi.json</a> and ' +
            '<a href="/openapi.yaml">/openapi.yaml</a>.</p>';
          return;
        }

        const config = {
          url: '/openapi.json',
          theme: 'none',
          layout: 'modern',
          darkMode: theme === 'dark',
          hideDarkModeToggle: true,
          withDefaultFonts: false,
          hideClientButton: true,
          hideModels: true,
          // Scalar's navbar dev-tools default to showing on localhost — which
          // is exactly where this mock runs — so switch them off explicitly.
          showDeveloperTools: 'never',
          defaultHttpClient: { targetKey: 'shell', clientKey: 'curl' },
          // hiddenClients is a denylist, so to show only the curated set
          // (curl, python requests, go, rust, java okhttp, js axios, php
          // guzzle) every other language is hidden outright and the kept
          // languages list the *other* clients to hide.
          hiddenClients: {
            shell: ['httpie', 'wget'],
            python: ['aiohttp', 'httpx_async', 'httpx_sync', 'python3'],
            go: false,
            rust: false,
            java: ['asynchttp', 'nethttp', 'unirest'],
            js: ['fetch', 'jquery', 'ofetch', 'xhr'],
            php: ['curl', 'laravel'],
            c: true,
            clojure: true,
            csharp: true,
            dart: true,
            fsharp: true,
            http: true,
            kotlin: true,
            node: true,
            objc: true,
            ocaml: true,
            powershell: true,
            r: true,
            ruby: true,
            swift: true,
          },
          agent: { disabled: true },
          // "Generate MCP" likewise uploads the spec to Scalar's backend — off.
          mcp: { disabled: true },
        };
        if (token) {
          config.authentication = {
            preferredSecurityScheme: 'bearerAuth',
            securitySchemes: { bearerAuth: { token: token } },
          };
        }

        Scalar.createApiReference('#app', config);

        function setTheme(next) {
          saveTheme(next);
          applyThemeClass(next);
        }

        const toggle = document.getElementById('theme-toggle');
        if (toggle) {
          toggle.addEventListener('click', () => {
            const current = document.body.classList.contains('dark-mode')
              ? 'dark' : 'light';
            setTheme(current === 'dark' ? 'light' : 'dark');
          });
        }
      })();
    </script>
  </body>
</html>

openapi: 3.1.0
info:
  title: auth0-mock service endpoints
  version: 1.0.0
tags:
  - name: Service
    description: Service plumbing — health probe, JWKS, OpenAPI export, and the rendered docs page.
paths:
  /healthz:
    get:
      tags: [Service]
      summary: Liveness probe.
      description: Returns 200 if the process is up. No authentication.
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /readyz:
    get:
      tags: [Service]
      summary: Readiness probe.
      description: |
        Returns 200 once the service can actually serve traffic (today: JWKS
        signing key materialised); 503 with a `reason` field otherwise. Use
        instead of /healthz for orchestrator readiness gates so process
        liveness and request-serving readiness stay distinguishable.
      responses:
        "200":
          description: Service is ready.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ready
        "503":
          description: Service is not yet ready.
          content:
            application/json:
              schema:
                type: object
                required: [status, reason]
                properties:
                  status:
                    type: string
                    example: not_ready
                  reason:
                    type: string
  /.well-known/jwks.json:
    get:
      tags: [Service]
      summary: JSON Web Key Set used to verify tokens minted by /oauth/token.
      responses:
        "200":
          description: JWKS document.
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      type: object
  /openapi.json:
    get:
      tags: [Service]
      summary: The merged OpenAPI 3.1 spec for this mock instance.
      description: |
        Returns the same bytes as `api/auth0-mock.openapi.json` in the repo.
        Import this URL directly into Postman or Insomnia.
      responses:
        "200":
          description: OpenAPI document.
          content:
            application/json:
              schema:
                type: object
  /openapi.yaml:
    get:
      tags: [Service]
      summary: The merged OpenAPI 3.1 spec, YAML-encoded.
      responses:
        "200":
          description: OpenAPI document.
          content:
            application/yaml:
              schema:
                type: object
  /docs:
    get:
      tags: [Service]
      summary: Interactive API reference rendered by Scalar.
      description: |
        Returns a single-page HTML reference that loads `/openapi.json` at
        runtime and renders docs plus a "Try it out" panel. The spec's
        `servers[0].url` already points at this mock, so requests issued from
        the panel hit the same instance that served the page.
      responses:
        "200":
          description: HTML reference page.
          content:
            text/html:
              schema:
                type: string
